<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/tailwind.css" />
    <script src="./js/main.js" defer></script>
    <title>Project - Portfolio</title>
  </head>
  <body>
    <!-- Desktop Nav -->
    <nav class="desktop-nav" aria-label="Primary navigation">
      <h1 class="desktop-nav__logo">Fran Batet</h1>
      <div>
        <ul class="desktop-nav__links">
          <li><a href="#about" class="desktop-nav__link">About</a></li>
          <li>
            <a href="#experience" class="desktop-nav__link">Experience</a>
          </li>
          <li><a href="#projects" class="desktop-nav__link">Projects</a></li>
          <li><a href="#contact" class="desktop-nav__link">Contact</a></li>
        </ul>
      </div>
    </nav>
    <!-- Mobile Nav -->
    <nav class="mobile-nav">
      <h2 class="mobile-nav__logo">Fran Batet</h2>
      <div class="mobile-nav__menu">
        <div class="mobile-nav__icon" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <ul class="mobile-nav__links">
          <li>
            <a href="#about" class="mobile-nav__link" onclick="toggleMenu()"
              >About</a
            >
          </li>
          <li>
            <a
              href="#experience"
              class="mobile-nav__link"
              onclick="toggleMenu()"
              >Experience</a
            >
          </li>
          <li>
            <a href="#projects" class="mobile-nav__link" onclick="toggleMenu()"
              >Projects</a
            >
          </li>
          <li>
            <a href="#contact" class="mobile-nav__link" onclick="toggleMenu()"
              >Contact</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <main>
      <!-- Hero Section -->
      <section class="hero">
        <div class="section__pic-container">
          <img
            src="https://picsum.photos/400"
            alt="Fran Batet profile picture"
          />
        </div>
        <div class="section__text">
          <p class="section__text-p1">Hello, I'm</p>
          <h1 class="section__text-title">Fran Batet</h1>
          <p class="section__text-p2">Web Developer</p>
          <div class="btn-container">
            <button
              class="btn btn-color-2"
              onclick="window.open('./assets/resume-example-pdf')"
            >
              Download CV
            </button>
            <button
              class="btn btn-color-1"
              onclick="location.href='./#contact'"
            >
              Contact Info
            </button>
          </div>
          <div class="socials__container">
            <img src="./assets/icons/" alt="" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
